name: Core Tests

on:
  push:
    branches:
      - main
      - dev/**
      - docs/**
  pull_request:
    branches:
      - main

jobs:
  core-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile Python files
        run: python3 -m compileall a4_core platform_modules tests

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

      - name: Run benchmark
        run: python3 -m a4_core.benchmark

